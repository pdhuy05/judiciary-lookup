<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hệ thống tra cứu danh bạ nhân sự" />
  <title>Danh Bạ Nhân Sự</title>
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-container">
        <img src="img/logo.png" alt="Logo Tòa án nhân dân" class="header-logo" />
        <div class="header-content">
          <h1 class="header-title">Danh Bạ Nhân Sự</h1>
          <p class="header-subtitle">Tra cứu thông tin nhân sự</p>
        </div>
        <button class="theme-btn" id="themeToggle" aria-label="Toggle dark mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Search Section -->
      <section class="search-section">
        <div class="search-wrapper">
          <div class="search-box">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input 
              type="text" 
              id="searchInput" 
              class="search-input" 
              placeholder="Tìm theo tên, bộ phận..."
              autocomplete="off"
            />
            <button class="search-clear" id="searchClear" aria-label="Clear search" hidden>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <!-- Stats Section -->
      <section class="stats-section">
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="totalStaff">0</div>
            <div class="stat-name">Tổng nhân sự</div>
          </div>
          <div class="stat-item stat-item-animated">
            <div class="aquatic-scene" id="aquaticScene">
              <svg class="aquatic-canvas" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="fishGradA" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#38bdf8"/>
                    <stop offset="100%" stop-color="#0369a1"/>
                  </linearGradient>
                  <linearGradient id="fishGradB" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#34d399"/>
                    <stop offset="100%" stop-color="#047857"/>
                  </linearGradient>
                </defs>

                <!-- Bubble animations container -->
                <g class="bubbles-container"></g>

                <!-- Fish 1 -->
                <g class="creature fish-1">
                  <g class="creature-inner">
                    <path d="M -20 -6 Q -26 -10 -28 0 Q -26 10 -20 6 Z" class="fish-tail"/>
                    <path d="M -20 0 Q -14 -11 0 -10 Q 14 -9 18 0 Q 14 9 0 10 Q -14 11 -20 0 Z" class="fish-body"/>
                    <path d="M -6 -8 Q 0 -13 6 -9" class="fish-fin"/>
                    <circle cx="9" cy="-2" r="2.2" class="fish-eye"/>
                  </g>
                </g>

                <!-- Fish 2 -->
                <g class="creature fish-2">
                  <g class="creature-inner">
                    <path d="M -18 -5 Q -23 -9 -25 0 Q -23 9 -18 5 Z" class="fish3-tail"/>
                    <path d="M -18 0 Q -12 -10 2 -9 Q 13 -8 16 0 Q 13 8 2 9 Q -12 10 -18 0 Z" class="fish3-body"/>
                    <circle cx="8" cy="-2" r="2" class="fish3-eye"/>
                  </g>
                </g>

                <!-- Octopus -->
                <g class="creature octopus">
                  <g class="creature-inner">
                    <g class="octopus-tentacles">
                      <path d="M -7 4 Q -11 14 -8 24" class="octopus-tentacle"/>
                      <path d="M -3 7 Q -4 17 -2 26" class="octopus-tentacle"/>
                      <path d="M 3 7 Q 4 17 2 26" class="octopus-tentacle"/>
                      <path d="M 7 4 Q 11 14 8 24" class="octopus-tentacle"/>
                    </g>
                    <circle cx="0" cy="-2" r="11" class="octopus-head"/>
                    <circle cx="-4" cy="-4" r="1.6" class="octopus-eye"/>
                    <circle cx="4" cy="-4" r="1.6" class="octopus-eye"/>
                  </g>
                </g>

                <!-- Jellyfish -->
                <g class="creature jellyfish">
                  <g class="creature-inner">
                    <path d="M -9 -2 Q -9 -12 0 -12 Q 9 -12 9 -2 Q 5 2 0 0 Q -5 2 -9 -2 Z" class="jellyfish-head"/>
                    <g class="jellyfish-tentacles">
                      <path d="M -5 0 Q -9 8 -6 18" class="jellyfish-tentacle"/>
                      <path d="M 0 1 Q -1 10 1 20" class="jellyfish-tentacle"/>
                      <path d="M 5 0 Q 9 8 6 18" class="jellyfish-tentacle"/>
                    </g>
                  </g>
                </g>

                <!-- Starfish -->
                <g class="creature starfish">
                  <g class="creature-inner">
                    <path d="M 0 -9 L 4 -3 L 10 -2 L 5 3 L 7 10 L 0 6 L -7 10 L -5 3 L -10 -2 L -4 -3 Z" class="starfish-arms"/>
                    <circle cx="0" cy="0" r="3" class="starfish-body"/>
                  </g>
                </g>

                <!-- Crab -->
                <g class="creature crab">
                  <g class="creature-inner">
                    <g class="crab-legs">
                      <path d="M -8 3 Q -13 6 -13 12" class="crab-leg"/>
                      <path d="M -4 7 Q -6 12 -7 17" class="crab-leg"/>
                      <path d="M 4 7 Q 6 12 7 17" class="crab-leg"/>
                      <path d="M 8 3 Q 13 6 13 12" class="crab-leg"/>
                    </g>
                    <g class="crab-claws">
                      <path d="M -8 -3 Q -16 -6 -15 0 Q -13 1 -10 -1" class="crab-claw"/>
                      <path d="M 8 -3 Q 16 -6 15 0 Q 13 1 10 -1" class="crab-claw"/>
                    </g>
                    <ellipse cx="0" cy="0" rx="9" ry="7" class="crab-body"/>
                    <circle cx="-3" cy="-5" r="1.6" class="crab-eye"/>
                    <circle cx="3" cy="-5" r="1.6" class="crab-eye"/>
                  </g>
                </g>
              </svg>
            </div>
          </div>
        </div>
      </section>

      <!-- Results Container -->
      <div id="resultsContainer">
        <!-- Loading State -->
        <div id="loadingState" class="loading-state" hidden>
          <div class="skeleton">
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-line" style="width: 60%; margin-top: 12px;"></div>
          </div>
          <div class="skeleton">
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-line" style="width: 60%; margin-top: 12px;"></div>
          </div>
        </div>

        <!-- Initial Prompt -->
        <div id="promptState" class="prompt-state">
          <div class="prompt-icon">🔍</div>
          <h2 class="prompt-title">Bắt đầu tìm kiếm</h2>
          <p class="prompt-text">Nhập tên hoặc bộ phận để tra cứu thông tin nhân sự</p>
        </div>

        <!-- Results Grid -->
        <div id="resultsGrid" class="results-grid" hidden></div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">○</div>
          <h2 class="empty-title">Không tìm thấy</h2>
          <p class="empty-text">Không có nhân sự nào khớp với từ khóa tìm kiếm</p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Dữ liệu nội bộ • Cập nhật lần cuối bởi Bộ phận Quản trị</p>
      <p>© <span id="copyrightYear"></span> Bản quyền thuộc về Đình Huy</p>
    </footer>

    <!-- Scroll to Top -->
    <button class="scroll-top" id="scrollTopBtn" aria-label="Scroll to top" hidden>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M7 10l5-5 5 5M12 15V5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
