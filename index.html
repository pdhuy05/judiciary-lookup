<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hệ thống tra cứu danh bạ nhân sự" />
  <title>Danh Bạ Nhân Sự</title>
  <link rel="stylesheet" href="css/style.css?v=4" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-container">
        <img src="img/logo.png" alt="Logo Tòa án nhân dân" class="header-logo" />
        <div class="header-content">
          <h1 class="header-title">Danh Bạ Nhân Sự</h1>
          <p class="header-subtitle">Tra cứu thông tin nhân sự</p>
        </div>
        <button class="theme-btn" id="themeToggle" aria-label="Toggle dark mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Search Section -->
      <section class="search-section">
        <div class="search-wrapper">
          <div class="search-box">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input 
              type="text" 
              id="searchInput" 
              class="search-input" 
              placeholder="Tìm theo tên, bộ phận..."
              autocomplete="off"
            />
            <button class="search-clear" id="searchClear" aria-label="Clear search" hidden>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <!-- Stats Section -->
      <section class="stats-section">
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="totalStaff">0</div>
            <div class="stat-name">Tổng nhân sự</div>
          </div>
          <div class="stat-item stat-item-animated">
            <div class="aquatic-scene" id="aquaticScene">
              <svg class="aquatic-canvas" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                  <linearGradient id="fishGradA" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#38bdf8"/>
                    <stop offset="100%" stop-color="#0369a1"/>
                  </linearGradient>
                  <linearGradient id="fishGradB" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#34d399"/>
                    <stop offset="100%" stop-color="#047857"/>
                  </linearGradient>
                  <linearGradient id="fishGradC" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#f472b6"/>
                    <stop offset="100%" stop-color="#be185d"/>
                  </linearGradient>
                  <linearGradient id="fishGradD" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#fbbf24"/>
                    <stop offset="100%" stop-color="#ea580c"/>
                  </linearGradient>
                  <linearGradient id="fishGradE" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#a78bfa"/>
                    <stop offset="100%" stop-color="#6d28d9"/>
                  </linearGradient>
                  <linearGradient id="fishGradF" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#22d3ee"/>
                    <stop offset="100%" stop-color="#2563eb"/>
                  </linearGradient>
                </defs>

                <!-- Bubble animations container -->
                <g class="bubbles-container"></g>

                <!-- Seabed decor -->
                <g class="reef reef-left">
                  <path d="M 0 190 Q 18 176 34 184 T 62 186 L 62 200 L 0 200 Z" class="sandbank"/>
                  <path d="M 18 184 C 14 174 16 164 20 156 C 25 163 25 174 23 184" class="seaweed seaweed-a"/>
                  <path d="M 28 185 C 24 171 26 158 32 148 C 36 158 35 172 34 185" class="seaweed seaweed-b"/>
                  <path d="M 38 186 C 35 176 36 166 41 157 C 45 165 45 176 44 186" class="seaweed seaweed-c"/>
                  <path d="M 10 188 C 15 179 16 170 14 162 C 22 165 26 176 24 188" class="coral coral-pink"/>
                  <path d="M 46 188 C 43 178 47 168 54 162 C 58 169 58 180 54 188" class="coral coral-orange"/>
                  <circle cx="7" cy="188" r="2.3" class="reef-stone"/>
                  <circle cx="56" cy="190" r="1.8" class="reef-stone reef-stone-soft"/>
                </g>

                <g class="reef reef-right">
                  <path d="M 138 188 Q 156 176 171 184 T 200 186 L 200 200 L 138 200 Z" class="sandbank"/>
                  <path d="M 154 186 C 150 174 151 162 157 152 C 163 162 161 175 159 186" class="seaweed seaweed-a"/>
                  <path d="M 166 188 C 162 176 164 164 170 153 C 175 164 173 177 171 188" class="seaweed seaweed-b"/>
                  <path d="M 179 188 C 176 178 177 168 182 159 C 187 168 186 178 185 188" class="seaweed seaweed-c"/>
                  <path d="M 145 189 C 149 178 149 168 146 160 C 155 163 159 176 157 189" class="coral coral-violet"/>
                  <path d="M 188 189 C 183 179 184 170 189 162 C 196 168 197 180 193 189" class="coral coral-cyan"/>
                  <circle cx="141" cy="191" r="2.1" class="reef-stone"/>
                  <circle cx="194" cy="188" r="1.7" class="reef-stone reef-stone-soft"/>
                </g>

                <g class="kelp-forest">
                  <path d="M 74 198 C 72 184 74 170 80 154 C 86 168 84 183 82 198" class="kelp kelp-tall"/>
                  <path d="M 88 198 C 86 187 87 178 91 169 C 96 177 96 188 94 198" class="kelp kelp-mid"/>
                  <path d="M 101 198 C 99 186 101 172 106 160 C 111 171 110 186 108 198" class="kelp kelp-tall kelp-delay"/>
                  <path d="M 116 198 C 114 189 115 180 119 172 C 124 180 124 189 122 198" class="kelp kelp-short"/>
                  <path d="M 126 198 C 124 186 126 174 131 164 C 137 176 135 188 133 198" class="kelp kelp-mid kelp-delay-2"/>
                </g>

                <!-- Fish 1 -->
                <g class="creature fish-1">
                  <g class="creature-inner">
                    <path d="M -20 -6 Q -26 -10 -28 0 Q -26 10 -20 6 Z" class="fish-tail"/>
                    <path d="M -20 0 Q -14 -11 0 -10 Q 14 -9 18 0 Q 14 9 0 10 Q -14 11 -20 0 Z" class="fish-body"/>
                    <path d="M -9 -2 Q -1 -8 11 -6" class="fish-shine"/>
                    <path d="M -10 2 Q 0 7 10 4" class="fish-pattern fish-pattern-soft"/>
                    <path d="M -7 -8 Q -2 -14 5 -10" class="fish-fin-top"/>
                    <path d="M -5 8 Q 0 12 6 8" class="fish-fin-bottom"/>
                    <path d="M -9 -5 Q -11 0 -8 5" class="fish-gill"/>
                    <path d="M -6 -8 Q 0 -13 6 -9" class="fish-fin"/>
                    <circle cx="9" cy="-2" r="2.4" class="fish-eye"/>
                    <circle cx="9.8" cy="-2" r="1.15" class="fish-pupil"/>
                    <circle cx="10.6" cy="-2.7" r="0.45" class="fish-eye-spark"/>
                  </g>
                </g>

                <!-- Fish 2 -->
                <g class="creature fish-2">
                  <g class="creature-inner">
                    <path d="M -18 -5 Q -23 -9 -25 0 Q -23 9 -18 5 Z" class="fish3-tail"/>
                    <path d="M -18 0 Q -12 -10 2 -9 Q 13 -8 16 0 Q 13 8 2 9 Q -12 10 -18 0 Z" class="fish3-body"/>
                    <path d="M -8 -2 Q 0 -7 9 -4" class="fish-shine fish-shine-cool"/>
                    <path d="M -7 2 Q 0 6 8 2" class="fish-pattern fish-pattern-cool"/>
                    <path d="M -5 -7 Q 1 -12 7 -7" class="fish3-fin fish-fin-top"/>
                    <path d="M -8 -4 Q -10 0 -7 4" class="fish-gill fish-gill-cool"/>
                    <circle cx="8" cy="-2" r="2.1" class="fish3-eye"/>
                    <circle cx="8.8" cy="-2" r="1" class="fish-pupil"/>
                    <circle cx="9.5" cy="-2.6" r="0.4" class="fish-eye-spark"/>
                  </g>
                </g>

                <!-- Fish 3 -->
                <g class="creature fish-3">
                  <g class="creature-inner">
                    <path d="M -16 -5 Q -23 -10 -27 0 Q -23 10 -16 5 Z" class="fish4-tail"/>
                    <path d="M -16 0 Q -10 -12 2 -11 Q 14 -10 20 0 Q 14 10 2 11 Q -10 12 -16 0 Z" class="fish4-body"/>
                    <path d="M -8 -3 Q 0 -10 12 -6" class="fish-shine fish-shine-pink"/>
                    <path d="M -8 4 Q 1 8 11 4" class="fish-pattern fish-pattern-pink"/>
                    <path d="M -2 -10 Q 6 -16 11 -8" class="fish4-fin"/>
                    <path d="M -1 10 Q 6 16 11 8" class="fish4-fin fish4-fin-lower"/>
                    <path d="M -7 -5 Q -9 0 -7 5" class="fish-gill fish-gill-pink"/>
                    <circle cx="10" cy="-2" r="2.2" class="fish4-eye"/>
                    <circle cx="10.9" cy="-2" r="1" class="fish-pupil"/>
                    <circle cx="11.7" cy="-2.7" r="0.4" class="fish-eye-spark"/>
                  </g>
                </g>

                <!-- Fish 4 -->
                <g class="creature fish-4">
                  <g class="creature-inner">
                    <path d="M -14 -4 Q -20 -8 -23 0 Q -20 8 -14 4 Z" class="fish5-tail"/>
                    <path d="M -14 0 Q -8 -9 0 -10 Q 12 -9 16 0 Q 12 9 0 10 Q -8 9 -14 0 Z" class="fish5-body"/>
                    <path d="M -7 -2 Q 0 -8 9 -5" class="fish-shine fish-shine-warm"/>
                    <path d="M -3 -8 Q 4 -13 8 -7" class="fish5-fin"/>
                    <path d="M -6 -4 Q -8 0 -6 4" class="fish-gill fish-gill-warm"/>
                    <circle cx="8" cy="-2" r="2" class="fish5-eye"/>
                    <circle cx="8.8" cy="-2" r="0.92" class="fish-pupil"/>
                    <circle cx="9.4" cy="-2.5" r="0.35" class="fish-eye-spark"/>
                    <path d="M -5 0 Q 0 3 7 1" class="fish5-stripe"/>
                    <path d="M -4 -4 Q 1 -1 7 -3" class="fish5-stripe"/>
                  </g>
                </g>

                <!-- Fish 5 -->
                <g class="creature fish-5">
                  <g class="creature-inner">
                    <path d="M -18 -6 Q -25 -11 -29 0 Q -25 11 -18 6 Z" class="fish6-tail"/>
                    <path d="M -18 0 Q -12 -13 2 -12 Q 17 -11 23 0 Q 17 11 2 12 Q -12 13 -18 0 Z" class="fish6-body"/>
                    <path d="M -8 -4 Q 1 -11 14 -7" class="fish-shine fish-shine-violet"/>
                    <path d="M -2 -11 Q 7 -18 13 -9" class="fish6-fin"/>
                    <path d="M -8 -5 Q -10 0 -8 5" class="fish-gill fish-gill-violet"/>
                    <circle cx="11" cy="-2" r="2.2" class="fish6-eye"/>
                    <circle cx="11.9" cy="-2" r="1.02" class="fish-pupil"/>
                    <circle cx="12.7" cy="-2.7" r="0.38" class="fish-eye-spark"/>
                    <circle cx="-1" cy="0" r="1.7" class="fish6-spot"/>
                    <circle cx="5" cy="-5" r="1.5" class="fish6-spot"/>
                    <circle cx="7" cy="4" r="1.4" class="fish6-spot"/>
                    <path d="M -4 6 Q 3 8 11 4" class="fish-pattern fish-pattern-violet"/>
                  </g>
                </g>

                <!-- Fish 6 -->
                <g class="creature fish-6">
                  <g class="creature-inner">
                    <path d="M -15 -5 Q -21 -9 -24 0 Q -21 9 -15 5 Z" class="fish7-tail"/>
                    <path d="M -15 0 Q -9 -10 0 -11 Q 13 -10 18 0 Q 13 10 0 11 Q -9 10 -15 0 Z" class="fish7-body"/>
                    <path d="M -1 -9 Q 6 -14 10 -8" class="fish7-fin"/>
                    <path d="M -7 -3 Q 1 -9 10 -6" class="fish-shine fish-shine-sky"/>
                    <path d="M -6 -5 Q -8 0 -6 5" class="fish-gill fish-gill-sky"/>
                    <path d="M -6 0 L 8 0" class="fish7-stripe"/>
                    <path d="M -4 4 L 7 4" class="fish7-stripe fish7-stripe-soft"/>
                    <circle cx="9" cy="-2" r="2.05" class="fish7-eye"/>
                    <circle cx="9.8" cy="-2" r="0.94" class="fish-pupil"/>
                    <circle cx="10.5" cy="-2.6" r="0.35" class="fish-eye-spark"/>
                  </g>
                </g>
              </svg>
            </div>
          </div>
        </div>
      </section>

      <!-- Results Container -->
      <div id="resultsContainer">
        <!-- Loading State -->
        <div id="loadingState" class="loading-state" hidden>
          <div class="skeleton">
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-line" style="width: 60%; margin-top: 12px;"></div>
          </div>
          <div class="skeleton">
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-line" style="width: 60%; margin-top: 12px;"></div>
          </div>
        </div>

        <!-- Initial Prompt -->
        <div id="promptState" class="prompt-state">
          <div class="prompt-icon">🔍</div>
          <h2 class="prompt-title">Bắt đầu tìm kiếm</h2>
          <p class="prompt-text">Nhập tên hoặc bộ phận để tra cứu thông tin nhân sự</p>
        </div>

        <!-- Results Grid -->
        <div id="resultsGrid" class="results-grid" hidden></div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">○</div>
          <h2 class="empty-title">Không tìm thấy</h2>
          <p class="empty-text">Không có nhân sự nào khớp với từ khóa tìm kiếm</p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Dữ liệu nội bộ • Cập nhật lần cuối bởi Bộ phận Quản trị</p>
      <p>© <span id="copyrightYear"></span> Bản quyền thuộc về Đình Huy</p>
    </footer>

    <!-- Scroll to Top -->
    <button class="scroll-top" id="scrollTopBtn" aria-label="Scroll to top" hidden>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M7 10l5-5 5 5M12 15V5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
