<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Hệ thống tra cứu danh bạ nhân sự" />
  <title>Danh bạ Nhân sự</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-container">
        <div class="header-content">
          <h1 class="header-title">Danh bạ Nhân sự</h1>
          <p class="header-subtitle">Tra cứu thông tin nhân sự</p>
        </div>
        <button class="theme-btn" id="themeToggle" aria-label="Toggle dark mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Search Section -->
      <section class="search-section">
        <div class="search-wrapper">
          <div class="search-box">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input 
              type="text" 
              id="searchInput" 
              class="search-input" 
              placeholder="Tìm theo tên, bộ phận..."
              autocomplete="off"
            />
            <button class="search-clear" id="searchClear" aria-label="Clear search" hidden>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
      </section>

      <!-- Stats Section -->
      <section class="stats-section">
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="totalStaff">0</div>
            <div class="stat-name">Tổng nhân sự</div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="deptCount">0</div>
            <div class="stat-name">Bộ phận</div>
          </div>
        </div>
      </section>

      <!-- Results Container -->
      <div id="resultsContainer">
        <!-- Loading State -->
        <div id="loadingState" class="loading-state" hidden>
          <div class="skeleton">
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-line" style="width: 60%; margin-top: 12px;"></div>
          </div>
          <div class="skeleton">
            <div class="skeleton-line"></div>
            <div class="skeleton-line" style="width: 80%;"></div>
            <div class="skeleton-line" style="width: 60%; margin-top: 12px;"></div>
          </div>
        </div>

        <!-- Initial Prompt -->
        <div id="promptState" class="prompt-state">
          <div class="prompt-icon">🔍</div>
          <h2 class="prompt-title">Bắt đầu tìm kiếm</h2>
          <p class="prompt-text">Nhập tên hoặc bộ phận để tra cứu thông tin nhân sự</p>
        </div>

        <!-- Results Grid -->
        <div id="resultsGrid" class="results-grid" hidden></div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state" hidden>
          <div class="empty-icon">○</div>
          <h2 class="empty-title">Không tìm thấy</h2>
          <p class="empty-text">Không có nhân sự nào khớp với từ khóa tìm kiếm</p>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>Dữ liệu nội bộ • Cập nhật lần cuối bởi Bộ phận Quản trị</p>
      <p>© <span id="copyrightYear"></span> Bản quyền thuộc về Đình Huy</p>
    </footer>

    <!-- Scroll to Top -->
    <button class="scroll-top" id="scrollTopBtn" aria-label="Scroll to top" hidden>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M7 10l5-5 5 5M12 15V5" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
